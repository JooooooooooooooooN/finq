<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 뉴스 — FinQ</title>
<meta name="description" content="한국 주요 경제 뉴스를 빠르게 확인하세요. 연합뉴스, 한국경제 등 주요 매체의 실시간 경제 뉴스 모음.">
<link rel="canonical" href="https://finq.kr/news/">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta property="og:title" content="경제 뉴스 — FinQ">
<meta property="og:description" content="한국 주요 경제 뉴스를 빠르게 확인하세요.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://finq.kr/news/">
<style>
:root {
  --bg: #ffffff; --bg2: #f8f9fb; --card: #ffffff;
  --text: #1a1a2e; --text2: #6b7280;
  --border: #e5e7eb; --accent: #2563eb; --accent-h: #1d4ed8;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-h: 0 4px 12px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0a0e14; --bg2: #111827; --card: #1a1f2e;
  --text: #f1f5f9; --text2: #94a3b8;
  --border: #1e293b;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-h: 0 4px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

/* NAV */
.nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.nav-logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
.nav-logo span { color: var(--text); }
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-links a { padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
.nav-links a:hover { background: var(--bg2); color: var(--text); }
.nav-links a.active { background: var(--bg2); color: var(--text); font-weight: 600; }
.theme-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 16px; color: var(--text2); transition: all 0.15s; }
.theme-btn:hover { background: var(--bg2); }
.nav-mobile-btn { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 4px; }
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; gap: 4px; }
  .nav-links.open a { padding: 10px 14px; }
  .nav-mobile-btn { display: block; }
}

/* WRAP */
.page-wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* BREADCRUMB */
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; flex-wrap: wrap; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb-sep { color: var(--border); }

/* LIST PAGE */
.page-header { margin-bottom: 1.75rem; }
.page-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.page-desc { font-size: 14px; color: var(--text2); margin-top: 6px; }
.news-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; margin-top: 8px; }
.news-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 768px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .news-grid { grid-template-columns: 1fr; } }

.news-card { display: block; padding: 1rem 1.1rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.2s; cursor: pointer; }
.news-card:hover { border-color: var(--accent); background: var(--card); box-shadow: var(--shadow-h); transform: translateY(-1px); }
.news-card-meta { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.3px; margin-bottom: 5px; }
.news-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; word-break: keep-all; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.news-card-desc { font-size: 12px; color: var(--text2); line-height: 1.55; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* SKELETON */
.skeleton { background: var(--border); border-radius: 4px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
.skel-tag { height: 10px; width: 60%; margin-bottom: 8px; }
.skel-title { height: 14px; width: 90%; margin-bottom: 6px; }
.skel-title2 { height: 14px; width: 70%; margin-bottom: 8px; }
.skel-desc { height: 10px; width: 100%; margin-bottom: 4px; }
.skel-desc2 { height: 10px; width: 80%; }

/* DETAIL PAGE */
.detail-wrap { max-width: 720px; }
.detail-source-badge { display: inline-block; font-size: 12px; font-weight: 600; color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 3px 10px; border-radius: 20px; margin-bottom: 1rem; }
.detail-title { font-size: clamp(20px, 4vw, 28px); font-weight: 800; line-height: 1.3; letter-spacing: -0.5px; margin-bottom: 0.75rem; word-break: keep-all; }
.detail-meta { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
.detail-body { font-size: 15px; line-height: 1.85; color: var(--text); word-break: keep-all; margin-bottom: 2rem; padding: 1.5rem; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
.detail-link-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--accent); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 600; transition: background 0.15s; }
.detail-link-btn:hover { background: var(--accent-h); }
.detail-disclaimer { font-size: 12px; color: var(--text2); padding: 12px 16px; background: var(--bg2); border-radius: 8px; margin-top: 2rem; line-height: 1.7; }

/* ERROR */
.error-box { text-align: center; padding: 3rem 1rem; color: var(--text2); }
.error-box-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

/* FOOTER */
.footer { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-top: 1px solid var(--border); }
.footer-left { font-size: 13px; color: var(--text2); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; color: var(--text2); transition: color 0.15s; }
.footer-links a:hover { color: var(--text); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../" class="nav-logo">Fin<span>Q</span></a>
    <div class="nav-links" id="navLinks">
      <a href="../strategy/">전략</a>
      <a href="../data/">데이터</a>
      <a href="../simulation/">시뮬레이션</a>
      <a href="../insight/">인사이트</a>
      <a href="../news/" class="active">뉴스</a>
      <a href="../about/">소개</a>
      <button class="theme-btn" onclick="toggleTheme()" aria-label="테마 전환" id="themeBtn">🌙</button>
    </div>
    <button class="nav-mobile-btn" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="메뉴">☰</button>
  </div>
</nav>

<div class="page-wrap" id="pageWrap">
  <!-- JS로 렌더링 -->
</div>

<footer class="footer">
  <div class="footer-left">&copy; 2026 FinQ. 모든 투자 판단과 책임은 이용자에게 있습니다.</div>
  <div class="footer-links">
    <a href="../about/">소개</a>
    <a href="../privacy/">개인정보처리방침</a>
  </div>
</footer>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('finq-theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('finq-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const [, m, d] = dateStr.split('-');
  return `${m}.${d}`;
}

function skeletonCard() {
  return `<div class="news-card" style="pointer-events:none">
    <div class="skeleton skel-tag"></div>
    <div class="skeleton skel-title"></div>
    <div class="skeleton skel-title2"></div>
    <div class="skeleton skel-desc"></div>
    <div class="skeleton skel-desc2"></div>
  </div>`;
}

// ── 목록 페이지 ──
function renderList() {
  const wrap = document.getElementById('pageWrap');
  wrap.innerHTML = `
    <div class="breadcrumb">
      <a href="../">FinQ</a>
      <span class="breadcrumb-sep">/</span>
      <span>경제 뉴스</span>
    </div>
    <div class="page-header">
      <h1 class="page-title">경제 뉴스</h1>
      <p class="page-desc">연합뉴스·한국경제 주요 경제 뉴스를 모아봅니다.</p>
      <span class="news-badge"><span class="news-badge-dot"></span>실시간 자동 업데이트</span>
    </div>
    <div class="news-grid" id="newsGrid">
      ${Array(9).fill(0).map(skeletonCard).join('')}
    </div>
  `;

  fetch('/api/news?limit=30')
    .then(r => r.json())
    .then(data => {
      const grid = document.getElementById('newsGrid');
      if (!grid) return;
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = `<div class="error-box" style="grid-column:1/-1"><div class="error-box-title">뉴스를 불러오지 못했습니다</div><p>잠시 후 다시 시도해주세요.</p></div>`;
        return;
      }
      grid.innerHTML = data.items.map(item => `
        <a class="news-card" href="?id=${encodeURIComponent(item.id)}">
          <div class="news-card-meta">${item.source} · ${fmtDate(item.date)}</div>
          <div class="news-card-title">${item.title}</div>
          <div class="news-card-desc">${item.summary}</div>
        </a>
      `).join('');
    })
    .catch(() => {
      const grid = document.getElementById('newsGrid');
      if (grid) grid.innerHTML = `<div class="error-box" style="grid-column:1/-1"><div class="error-box-title">뉴스를 불러오지 못했습니다</div><p>잠시 후 다시 시도해주세요.</p></div>`;
    });
}

// ── 상세 페이지 ──
function renderDetail(id) {
  const wrap = document.getElementById('pageWrap');
  wrap.innerHTML = `
    <div class="breadcrumb">
      <a href="../">FinQ</a>
      <span class="breadcrumb-sep">/</span>
      <a href="./">경제 뉴스</a>
      <span class="breadcrumb-sep">/</span>
      <span>기사 상세</span>
    </div>
    <div class="detail-wrap" id="detailWrap">
      <div style="color:var(--text2);padding:2rem 0">불러오는 중...</div>
    </div>
  `;

  fetch(`/api/news?id=${encodeURIComponent(id)}`)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(item => {
      document.title = `${item.title} — FinQ 뉴스`;
      const d = document.getElementById('detailWrap');
      if (!d) return;
      d.innerHTML = `
        <span class="detail-source-badge">${item.source}</span>
        <h1 class="detail-title">${item.title}</h1>
        <div class="detail-meta">${item.date ? item.date.replace(/-/g,'.') : ''}</div>
        <div class="detail-body">${item.summary || '본문을 불러올 수 없습니다.'}</div>
        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="detail-link-btn">
          원문 전체 보기
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <div class="detail-disclaimer">본 내용은 외부 뉴스 소스에서 자동 수집된 정보이며, FinQ가 작성하지 않았습니다. 투자 판단의 근거로 사용 시 원문을 반드시 확인하세요.</div>
      `;
    })
    .catch(() => {
      const d = document.getElementById('detailWrap');
      if (d) d.innerHTML = `<div class="error-box"><div class="error-box-title">기사를 찾을 수 없습니다</div><p><a href="./" style="color:var(--accent)">뉴스 목록으로 돌아가기</a></p></div>`;
    });
}

// ── 라우팅 ──
(function() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    renderDetail(id);
  } else {
    renderList();
  }
})();
</script>

</body>
</html>
